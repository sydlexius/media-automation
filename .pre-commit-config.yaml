repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: cef0300fd0fc4d2a87a85fa2093c6b283ea36f4b # v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: 996abf60411a8d954288ac9856aae7602b80cbda # v0.22.1
    hooks:
      - id: markdownlint-cli2
        args: []

  - repo: https://github.com/gitleaks/gitleaks
    rev: 83d9cd684c87d95d656c1458ef04895a7f1cbd8e # v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12
    hooks:
      - id: actionlint

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: bash -c 'source "$HOME/.cargo/env" 2>/dev/null; cd smpr && cargo fmt -- --check'
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: bash -c 'source "$HOME/.cargo/env" 2>/dev/null; cd smpr && cargo clippy -- -D warnings'
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-check
        name: cargo check
        entry: bash -c 'source "$HOME/.cargo/env" 2>/dev/null; cd smpr && cargo check'
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-fmt-rabsody
        name: cargo fmt (rabsody)
        entry: bash -c 'source "$HOME/.cargo/env" 2>/dev/null; cd rabsody && cargo fmt -- --check'
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy-rabsody
        name: cargo clippy (rabsody)
        entry: bash -c 'source "$HOME/.cargo/env" 2>/dev/null; cd rabsody && cargo clippy -- -D warnings'
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-check-rabsody
        name: cargo check (rabsody)
        entry: bash -c 'source "$HOME/.cargo/env" 2>/dev/null; cd rabsody && cargo check'
        language: system
        types: [rust]
        pass_filenames: false

[versioning]
file = "smpr/Cargo.toml"
pattern = 'version = "{version}"'
post_bump = ["cargo check --manifest-path smpr/Cargo.toml"]

[build]
working_dir = "smpr"
pre_checks = [
    "cargo fmt -- --check",
    "cargo clippy -- -D warnings",
    "cargo test -- --test-threads=1",
]

[release_notes]
group_labels = { "enhancement" = "New Features", "bug" = "Bug Fixes", "documentation" = "Documentation" }
default_group = "Improvements"

[release]
tag_prefix = "v"

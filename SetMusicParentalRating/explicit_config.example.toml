# Copy this file to explicit_config.toml and edit to taste.
# The script loads explicit_config.toml by default (override with --config).
#
# Precedence: CLI flags > environment variables > .env file > this file > defaults
#
# Environment files:
#   The script loads .env from the repo root by default.
#   Use --env-file to load a different file (e.g. --env-file .env.prod).
#   To connect to Emby, set EMBY_API_KEY and EMBY_URL in your .env.
#   To connect to Jellyfin, set JELLYFIN_API_KEY and JELLYFIN_URL in your .env
#   and set SERVER_TYPE=jellyfin (or use --server-type jellyfin on the CLI).

[general]
server_type = "emby"   # "emby" (default) or "jellyfin"
# A single library path. To scan multiple libraries, run the script once per
# library or use a wrapper script. The library_path can also be passed as the
# first positional CLI argument or via TAGLRC_LIBRARY_PATH env var.
library_path = ""

[emby]
url = "http://localhost:8096"
# API key goes in .env file as EMBY_API_KEY — do not put secrets in this file.

[jellyfin]
url = "http://localhost:8097"
# API key goes in .env file as JELLYFIN_API_KEY — do not put secrets in this file.

[detection]
# Set to true to also scan embedded lyrics tags for tracks with no sidecar file.
# On Emby this adds MediaSources to the bulk prefetch (larger payload); on Jellyfin it adds
# one per-track lyrics request for sidecar-matched tracks (priority/conflict resolution) plus
# one per-track request for tracks with no sidecar.
# If you enable this, consider also uncommenting lyrics_priority below.
embedded_lyrics = false

# Controls which source wins when a track has both a sidecar (.lrc/.txt) and embedded lyrics.
# Only applies when embedded_lyrics = true. Defaults to "sidecar" if unset.
#   most_explicit: whichever source detected the higher tier wins (R > PG-13 > clean)
#   sidecar:       sidecar always wins
#   embedded:      embedded tag wins (ties — equal tiers — still defer to sidecar)
# lyrics_priority = "most_explicit"

[detection.r]
stems = ["fuck", "shit", "pussy", "cock", "cum", "faggot"]
exact = ["blowjob", "cocksucker", "motherfuck", "bullshit"]

[detection.pg13]
stems = ["bitch", "whore", "slut"]
exact = ["hoe", "asshole", "piss"]

[detection.ignore]
false_positives = [
    "cockatoo",
    "cockatiel",
    "cocktail",
    "hancock",
    "dickens",
    "dickson",
    "scunthorpe",
    "pissarro",
    "circumstance",
    "circumstan",
    "cucumber",
    "cumulative",
    "cumbersome",
    "cumberbatch",
    "document",
    "incumbent",
    "succumb",
    "accumulate",
]

[detection.g_genres]
# Genres (case-insensitive) that identify instrumental/clean tracks → G rating.
# Run `python3 SetMusicParentalRating.py --list-genres` to see your library's genre tags.
# Leave empty (or omit section) to disable this feature.
genres = []
# Example values (uncomment and edit to enable):
# genres = ["Classical", "Ambient", "Instrumental", "Video Game Music", "Chiptune"]

[report]
output_path = "explicit_report.csv"

name: Release

on:
  push:
    tags:
      - "smpr-v*"
      - "rabsody-v*"

# Least privilege by default; only the release job is granted write (job-level
# permissions replace, not extend, the workflow-level set).
permissions:
  contents: read

jobs:
  setup:
    name: Resolve binary and version from tag
    runs-on: ubuntu-latest
    outputs:
      bin: ${{ steps.parse.outputs.bin }}
      binname: ${{ steps.parse.outputs.binname }}
      bin_upper: ${{ steps.parse.outputs.bin_upper }}
      version: ${{ steps.parse.outputs.version }}
    steps:
      - name: Parse tag
        id: parse
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          ref="$REF_NAME"
          # `bin` is the crate directory; `binname` is the built executable
          # (for both crates the executable matches the crate name). `version`
          # is the tag with its binary-namespaced prefix stripped.
          case "$ref" in
            smpr-v*)    bin=smpr;    binname=smpr;    version="${ref#smpr-v}" ;;
            rabsody-v*) bin=rabsody; binname=rabsody; version="${ref#rabsody-v}" ;;
            *) echo "::error::unrecognized release tag '$ref' (expected smpr-v* or rabsody-v*)"; exit 1 ;;
          esac
          if [ -z "$version" ]; then
            echo "::error::empty version parsed from tag '$ref'"; exit 1
          fi
          bin_upper="$(printf '%s' "$bin" | tr '[:lower:]' '[:upper:]')"
          {
            echo "bin=$bin"
            echo "binname=$binname"
            echo "bin_upper=$bin_upper"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"

  check:
    name: Lint and Test
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: "1.94"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ${{ needs.setup.outputs.bin }}

      - name: Check formatting
        working-directory: ${{ needs.setup.outputs.bin }}
        run: cargo fmt -- --check

      - name: Run clippy
        working-directory: ${{ needs.setup.outputs.bin }}
        run: cargo clippy -- -D warnings

      - name: Run tests
        working-directory: ${{ needs.setup.outputs.bin }}
        run: cargo test --verbose -- --test-threads=1

  build:
    name: Build (${{ matrix.name }})
    needs: [setup, check]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            suffix: linux-x86_64
            ext: ""
          - name: macos-intel
            runner: macos-latest
            target: x86_64-apple-darwin
            suffix: macos-intel
            ext: ""
          - name: macos-apple-silicon
            runner: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-apple-silicon
            ext: ""
          - name: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x86_64.exe
            ext: ".exe"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: "1.94"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ${{ needs.setup.outputs.bin }}
          key: ${{ matrix.target }}

      - name: Install musl tools (Linux only)
        if: matrix.name == 'linux-x86_64'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        shell: bash
        working-directory: ${{ needs.setup.outputs.bin }}
        env:
          # build.rs embeds this exact version, so CI needs no tag history fetch.
          OVERRIDE_NAME: ${{ needs.setup.outputs.bin_upper }}_VERSION_OVERRIDE
          OVERRIDE_VALUE: ${{ needs.setup.outputs.version }}
        run: |
          export "${OVERRIDE_NAME}=${OVERRIDE_VALUE}"
          cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        env:
          BIN: ${{ needs.setup.outputs.bin }}
          BINNAME: ${{ needs.setup.outputs.binname }}
          TARGET: ${{ matrix.target }}
          EXT: ${{ matrix.ext }}
          SUFFIX: ${{ matrix.suffix }}
        run: mv "${BIN}/target/${TARGET}/release/${BINNAME}${EXT}" "${BIN}-${SUFFIX}"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ needs.setup.outputs.bin }}-${{ matrix.suffix }}
          path: ${{ needs.setup.outputs.bin }}-${{ matrix.suffix }}

  release:
    name: Create GitHub Release
    needs: [setup, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # `gh release create --notes-from-tag` reads the annotated tag message
      # from the LOCAL repo, so the tag (with its annotation) must be present.
      # fetch-tags ensures the annotated tag object is fetched.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref }}
          # Full fetch: a shallow clone can omit the annotated tag object even
          # with fetch-tags, which breaks `gh release create --notes-from-tag`.
          fetch-tags: true
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true
          path: artifacts/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
          TITLE: ${{ needs.setup.outputs.bin }} ${{ needs.setup.outputs.version }}
        run: |
          # Notes come from the annotated tag message (the tag is the single
          # source of truth for both version and notes).
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" artifacts/* --clobber
          else
            gh release create "$TAG_NAME" artifacts/* \
              --title "$TITLE" \
              --notes-from-tag
          fi

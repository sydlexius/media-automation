name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-python:
    name: Lint (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff==0.15.5

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

  test-python:
    name: Test (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Verify imports
        run: python -c "import SetMusicParentalRating"
        working-directory: SetMusicParentalRating

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
        working-directory: SetMusicParentalRating
        if: hashFiles('SetMusicParentalRating/tests/**') != ''

  lint-rust:
    name: Lint (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smpr
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@1.85
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: smpr

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

  test-rust:
    name: Test (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smpr
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@1.85

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: smpr

      - name: Run tests
        run: cargo test --verbose

      - name: Build release
        run: cargo build --release

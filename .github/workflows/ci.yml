name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-rust:
    name: Lint (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smpr
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: "1.97"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: smpr

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

  test-rust:
    name: Test (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smpr
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: "1.97"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: smpr

      - name: Run tests
        # Sequential: config tests mutate process-global env vars
        run: cargo test --verbose -- --test-threads=1

      - name: Build release
        run: cargo build --release

  lint-rust-rabsody:
    name: Lint (Rust - rabsody)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rabsody
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: "1.97"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: rabsody

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

  test-rust-rabsody:
    name: Test (Rust - rabsody)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rabsody
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: "1.97"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: rabsody

      - name: Run tests
        run: cargo test --verbose -- --test-threads=1

      - name: Build release
        run: cargo build --release

  pre-commit:
    name: pre-commit (non-cargo hooks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Enforce the repo's pre-commit hooks (gitleaks secret scan, markdownlint,
      # actionlint, file hygiene) on every PR, independent of whether a
      # contributor ran `pre-commit install` locally. The cargo fmt/clippy/check
      # hooks are skipped here - they have dedicated jobs above with the proper
      # Rust toolchain and caching, so re-running them would be redundant.
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
        env:
          SKIP: cargo-fmt,cargo-clippy,cargo-check,cargo-fmt-rabsody,cargo-clippy-rabsody,cargo-check-rabsody
        with:
          extra_args: --all-files

# Re-request Copilot code review when new commits are pushed to a PR.
#
# The repo ruleset "Copilot auto-review" (review_on_push: true) should
# handle this natively, but it's unreliable. This workflow is a belt-and-
# suspenders fallback using `gh pr edit --add-reviewer @copilot`.

name: Re-request Copilot review

on:
  pull_request:
    types:
      - synchronize

permissions:
  pull-requests: write

jobs:
  re-request:
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Re-request Copilot review
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-reviewer @copilot
          echo "Re-requested Copilot review on PR #$PR_NUMBER"

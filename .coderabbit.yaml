language: en-US
reviews:
  auto_review:
    enabled: true
    drafts: false
  path_filters:
    - "!**/*.csv"
    - "!**/*.env*"
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_instructions: |
    After completing your full review, end your summary comment
    with the exact phrase on its own line:
    "This is the Way."
chat:
  auto_reply: true
